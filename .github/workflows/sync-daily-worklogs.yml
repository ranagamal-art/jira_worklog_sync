name: Sync Daily Worklogs

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Worklog date (YYYY-MM-DD). Leave empty for today."
        required: false
        type: string

concurrency:
  group: sync-daily-worklogs
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure Google service account
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          if [ -n "$GOOGLE_SHEET_ID" ]; then
            mkdir -p credentials
            printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT" > credentials/service-account.json
          fi

      - name: Sync worklogs from Jira
        env:
          JIRA_BASE_URL: https://gm-sdv.atlassian.net
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          OUTPUT_CSV: ./worklogs.csv
          TIMEZONE: Africa/Cairo
          GOOGLE_SERVICE_ACCOUNT_JSON: ./credentials/service-account.json
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_WORKSHEET_NAME: daily_worklogs
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            python sync_daily_worklogs.py --date "${{ inputs.date }}"
          else
            python sync_daily_worklogs.py
          fi

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: worklogs-${{ github.run_id }}
          path: worklogs.csv
          if-no-files-found: error

      - name: Publish worklog data for GitHub Pages
        env:
          TIMEZONE: Africa/Cairo
        run: |
          python - <<'PY'
          import csv
          import json
          import os
          from datetime import datetime, timezone

          rows = []
          with open("worklogs.csv", newline="", encoding="utf-8") as f:
              rows = list(csv.DictReader(f))

          for row in rows:
              row["hours_logged"] = float(row.get("hours_logged") or 0)
              row["worklog_count"] = int(row.get("worklog_count") or 0)

          payload = {
              "synced_at": datetime.now(timezone.utc).isoformat(),
              "date": rows[0]["date"] if rows else "",
              "timezone": os.environ.get("TIMEZONE", "Africa/Cairo"),
              "members": rows,
          }

          os.makedirs("docs/data", exist_ok=True)
          with open("docs/data/latest.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, indent=2)
              f.write("\n")
          PY

      - name: Commit and push worklog data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/latest.json
          git diff --staged --quiet || git commit -m "Update worklog data for GitHub Pages"
          git push
